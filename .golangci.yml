run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - gocritic
    - revive
    - unused
    - gofmt
    - goimports
    - misspell

linters-settings:
  gocritic:
    enabled-checks:
      - dupImport
      - truncateCmp
    disabled-checks:
      - exitAfterDefer
  revive:
    rules:
      - name: blank-imports
      - name: increment-decrement
      - name: var-naming
  gosec:
    excludes:
      - G304
      - G404

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0
