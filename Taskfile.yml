version: "3"

vars:
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  LDFLAGS: -s -w -buildid= -X main.version={{.VERSION}}

tasks:
  build:
    desc: Build the binary
    cmds:
      - CGO_ENABLED=0 go build -trimpath -ldflags="{{.LDFLAGS}}" -o bin/ticktick-mcp ./cmd/ticktick-mcp

  test:
    desc: Run tests with race detection and coverage
    cmds:
      - go test -race -cover ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run

  vuln:
    desc: Run govulncheck
    cmds:
      - govulncheck ./...

  tidy:
    desc: Run go mod tidy and verify no changes
    cmds:
      - go mod tidy
      - git diff --exit-code go.mod go.sum

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/
